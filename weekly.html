<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주간 플래너</title>
  <style>
    /* Notion-inspired color scheme */
    :root {
      --bg: #FFFFFF; --text: #373530; --text-secondary: #787774; --text-muted: #9B9A97;
      --surface: #FFFFFF; --surface-alt: #F7F6F3; --surface-hover: #F1F1EF;
      --border: #E9E9E7; --border-light: #E9E9E7; --border-lighter: #F1F1EF;
      --accent: #2EAADC; --accent-hover: #2496C4; --accent-bg: #E9F3F7;
      --shadow: rgba(15,15,15,0.04); --shadow-strong: rgba(15,15,15,0.1);
      --input-bg: #FFFFFF; --input-border: #E9E9E7;
      --modal-bg: #FFFFFF; --overlay: rgba(15,15,15,0.6);
      --morning-bg: linear-gradient(135deg, #FAF3DD 0%, #F5EBD0 100%);
      --afternoon-bg: linear-gradient(135deg, #E9F3F7 0%, #D8EBF2 100%);
      --evening-bg: linear-gradient(135deg, #F6F3F8 0%, #EDE8F2 100%);
      --card-bg: #FFFFFF; --card-border: #E9E9E7;
      --note-bg: #FAF3DD; --note-border: #C29343; --note-text: #976D57;
      --rest-bg: #F1F1EF;
    }
    body.dark {
      --bg: #191919; --text: #D4D4D4; --text-secondary: #9B9B9B; --text-muted: #6B6B6B;
      --surface: #202020; --surface-alt: #252525; --surface-hover: #2F2F2F;
      --border: #333333; --border-light: #333333; --border-lighter: #2A2A2A;
      --accent: #447ACB; --accent-hover: #5A90DD; --accent-bg: #1F282D;
      --shadow: rgba(0,0,0,0.3); --shadow-strong: rgba(0,0,0,0.5);
      --input-bg: #252525; --input-border: #404040;
      --modal-bg: #252525; --overlay: rgba(0,0,0,0.7);
      --morning-bg: linear-gradient(135deg, #372E20 0%, #302818 100%);
      --afternoon-bg: linear-gradient(135deg, #1F282D 0%, #1A2228 100%);
      --evening-bg: linear-gradient(135deg, #2A2430 0%, #25202B 100%);
      --card-bg: #252525; --card-border: #404040;
      --note-bg: #36291F; --note-border: #CB7B37; --note-text: #C19138;
      --rest-bg: #252525;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", sans-serif;
      font-size: 11px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      max-width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      box-shadow: 0 2px 4px var(--shadow);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .nav-links {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    a.nav-link {
      padding: 6px 12px;
      background: #2EAADC;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      transition: background 0.2s;
    }

    a.nav-link:hover {
      background: #2496C4;
    }

    .header-info {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 10px;
      font-size: 11px;
    }

    .info-block {
      padding: 8px 12px;
      background: var(--accent-bg);
      border-left: 3px solid var(--accent);
      border-radius: 2px;
    }

    .info-label {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .info-value {
      color: var(--text);
      font-weight: 500;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .week-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      font-weight: 600;
      color: var(--text-secondary);
    }

    input[type="date"],
    select {
      padding: 6px 8px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-size: 11px;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
    }

    button {
      padding: 6px 12px;
      border: 1px solid var(--input-border);
      background: var(--surface);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s;
    }

    button:hover {
      background: var(--surface-hover);
      border-color: #999;
    }

    button.export-btn {
      background: #10b981;
      color: white;
      border-color: #10b981;
    }

    button.export-btn:hover {
      background: #059669;
      border-color: #059669;
    }

    .planner-wrapper {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .week-grid {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
      height: fit-content;
      min-height: 100%;
    }

    .day-column {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 600px;
    }

    .day-header {
      text-align: center;
      padding: 10px;
      background: var(--surface);
      border-radius: 6px;
      border-bottom: 2px solid var(--accent);
      font-weight: 700;
      color: var(--text);
      font-size: 12px;
    }

    .day-name {
      display: block;
      font-size: 13px;
      color: var(--accent);
    }

    .day-date {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .saturday .day-header {
      background: var(--surface);
      border-bottom-color: #f59e0b;
    }

    .saturday .day-name {
      color: #d97706;
    }

    .sunday .day-header {
      background: var(--surface);
      border-bottom-color: #0284c7;
    }

    .sunday .day-name {
      color: #0284c7;
    }

    .time-block {
      flex: 1;
      background: var(--surface-alt);
      border: 1px dashed var(--border-light);
      border-radius: 4px;
      padding: 6px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 80px;
      display: flex;
      flex-direction: column;
    }

    .time-block:hover {
      background: var(--surface-hover);
      border-color: var(--border);
    }

    .time-block.morning {
      background: var(--morning-bg);
    }

    .time-block.afternoon {
      background: var(--afternoon-bg);
    }

    .time-block.evening {
      background: var(--evening-bg);
    }

    .time-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .tasks-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }

    .task-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      padding: 6px 8px;
      font-size: 11px;
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .task-card:hover {
      box-shadow: 0 2px 8px var(--shadow-strong);
    }
    .task-remove-btn {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: var(--text-muted);
      color: var(--surface);
      font-size: 10px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      padding: 0;
    }
    .task-card:hover .task-remove-btn {
      opacity: 1;
    }
    .task-remove-btn:hover {
      background: #C4554D;
      color: #fff;
    }

    .task-card:active {
      cursor: grabbing;
    }

    .task-card.dragging {
      opacity: 0.5;
    }

    .task-priority {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 700;
      margin-right: 4px;
      text-transform: uppercase;
    }

    .priority-urgent {
      background: #FAECEC;
      color: #C4554D;
    }

    .priority-high {
      background: #F8ECDF;
      color: #CC782F;
    }

    .priority-medium {
      background: #FAF3DD;
      color: #C29343;
    }

    .priority-low {
      background: #EEF3ED;
      color: #548164;
    }

    .task-name {
      font-weight: 500;
      display: block;
      margin-top: 3px;
      line-height: 1.3;
      word-break: break-word;
    }

    /* Color classes from Gantt chart */
    .c-map { border-left: 3px solid #6366f1; }
    .c-paper { border-left: 3px solid #f59e0b; }
    .c-comm { border-left: 3px solid #10b981; }
    .c-food { border-left: 3px solid #ec4899; }
    .c-action { border-left: 3px solid #ef4444; }
    .c-misc { border-left: 3px solid #8b5cf6; }
    .c-cde { border-left: 3px solid #0ea5e9; }
    .c-proj { border-left: 3px solid #0d9488; }
    .c-zoomcamp { border-left: 3px solid #dc2626; }
    .c-cert { border-left: 3px solid #059669; }
    .c-course { border-left: 3px solid #7c3aed; }
    .c-career { border-left: 3px solid #0284c7; }
    .c-interview { border-left: 3px solid #be185d; }
    .c-life { border-left: 3px solid #65a30d; }
    .c-leetcode { border-left: 3px solid #d97706; }
    .c-video { border-left: 3px solid #7c3aed; }
    .c-event { border-left: 3px solid #d946ef; }
    .c-diss { border-left: 3px solid #0891b2; }
    .c-admin { border-left: 3px solid #6b21a8; }

    .task-actions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid var(--border-lighter);
    }

    .task-btn {
      flex: 1;
      padding: 2px 4px;
      font-size: 9px;
      background: var(--surface-alt);
      border: 1px solid var(--border-light);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .task-btn:hover {
      background: var(--surface-hover);
    }

    .task-btn.delete {
      background: #fee2e2;
      color: #b91c1c;
    }

    .task-btn.delete:hover {
      background: #fecaca;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--modal-bg);
      border-radius: 8px;
      padding: 20px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px var(--shadow-strong);
    }

    .modal-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--text);
    }

    .form-control {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-size: 11px;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 80px;
      font-family: monospace;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: flex-end;
    }

    .btn-primary {
      background: #2EAADC;
      color: white;
      border-color: #2EAADC;
    }

    .btn-primary:hover {
      background: #2496C4;
      border-color: #2496C4;
    }

    .btn-secondary {
      background: #f0f0f0;
      border-color: #ddd;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 11px;
    }

    .empty-state-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    /* Rest day styling */
    .rest-day {
      background: var(--rest-bg) !important;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-weight: 600;
    }

    .study-day {
      position: relative;
    }

    .study-day::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #0284c7 0%, transparent 70%);
      border-radius: 0 6px 0 0;
    }

    @media (max-width: 1400px) {
      .header-info {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }

    @media (max-width: 768px) {
      .days-grid {
        grid-template-columns: 1fr;
      }

      .header-title {
        font-size: 14px;
      }
    }

    .note-btn {
      font-size: 9px;
    }

    .day-note {
      background: var(--note-bg);
      border: 1px dashed var(--note-border);
      border-radius: 3px;
      padding: 6px;
      font-size: 10px;
      margin-top: 4px;
      cursor: pointer;
      min-height: 30px;
      display: flex;
      align-items: center;
      font-style: italic;
      color: var(--note-text);
    }

    .day-note:empty::before {
      content: '+ Add note';
      color: var(--note-text);
    }

    .day-note.has-content {
      background: var(--note-bg);
      border-color: var(--note-border);
    }

    .time-blocks-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .task-card {
      animation: fadeIn 0.2s ease-out;
    }

    /* Dark mode priority overrides */
    body.dark .priority-urgent { background: #332523; color: #BE524B; }
    body.dark .priority-high { background: #36291F; color: #CB7B37; }
    body.dark .priority-medium { background: #1F282D; color: #447ACB; }
    body.dark .priority-low { background: #242B26; color: #4F9768; }
    body.dark .task-btn.delete { background: #7f1d1d; color: #fca5a5; }

    /* Action Items panel */
    .action-items-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .action-items-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .action-items-title {
      font-weight: 700;
      font-size: 12px;
      color: var(--text);
    }
    .action-items-hint {
      font-size: 10px;
      color: var(--text-muted);
      font-style: italic;
    }
    .action-items-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 32px;
      padding: 4px;
      border: 1px dashed var(--border-light);
      border-radius: 4px;
    }
    .action-items-list:empty::before {
      content: 'No action items';
      color: var(--text-muted);
      font-size: 10px;
      padding: 4px;
    }
    .action-item-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 10px;
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
    }
    .action-item-chip:hover {
      box-shadow: 0 2px 6px var(--shadow-strong);
      transform: translateY(-1px);
    }
    .action-item-chip:active { cursor: grabbing; }
    .action-item-chip.dragging { opacity: 0.4; }
    .action-item-chip .chip-priority {
      display: inline-block;
      padding: 1px 4px;
      border-radius: 2px;
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* Toggle buttons */
    .toggle-pill { display: flex; align-items: center; background: var(--surface); border: 1.5px solid var(--input-border); border-radius: 20px; padding: 3px; box-shadow: 0 2px 8px var(--shadow); cursor: pointer; }
    .toggle-pill span { padding: 4px 10px; font-size: 11.5px; font-weight: 600; border-radius: 16px; transition: all 0.2s; color: var(--text-muted); }
    .toggle-pill span.active { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <div class="header-title">주간 플래너 📅</div>
        <div class="nav-links">
          <div class="toggle-pill" id="themeToggle">
            <span id="themeLight" class="active">Light</span>
            <span id="themeDark">Dark</span>
          </div>
          <div class="toggle-pill" id="langToggle">
            <span id="langEN">EN</span>
            <span id="langKO" class="active">KO</span>
          </div>
          <a href="index.html" class="nav-link">← 간트 차트로 돌아가기</a>
        </div>
      </div>

      <div class="header-info">
        <div class="info-block">
          <div class="info-label">🎯 이번주 핵심 프로젝트</div>
          <div class="info-value" id="focusProject">로딩 중...</div>
        </div>
        <div class="info-block">
          <div class="info-label">📚 현재 학습</div>
          <div class="info-value" id="currentTraining">로딩 중...</div>
        </div>
        <div class="info-block">
          <div class="info-label">🏃 목표</div>
          <div class="info-value" id="exerciseGoal">이번주 2-3회 운동</div>
        </div>
      </div>

      <div class="controls">
        <div class="week-selector">
          <label for="weekPicker">주간 선택:</label>
          <input type="date" id="weekPicker">
        </div>
        <button onclick="goToCurrentWeek()">이번주</button>
        <button onclick="goToPreviousWeek()">← 이전주</button>
        <button onclick="goToNextWeek()">다음주 →</button>
        <button class="save-btn" id="weeklySaveBtn" onclick="saveToServer()" style="background:#548164; color:#fff; border-color:#548164;">💾 Save</button>
        <button class="export-btn" onclick="exportMarkdown()">📥 마크다운 내보내기</button>
      </div>
    </header>

    <!-- Action Items Panel -->
    <div class="action-items-panel" id="actionItemsPanel">
      <div class="action-items-header">
        <span class="action-items-title">🔴 Action Items</span>
        <span class="action-items-hint">Drag tasks into time blocks below</span>
      </div>
      <div class="action-items-list" id="actionItemsList"></div>
    </div>

    <div class="planner-wrapper">
      <div class="week-grid">
        <div class="days-grid" id="daysGrid"></div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">작업 수정</div>
      <div class="form-group">
        <label class="form-label">작업명</label>
        <input type="text" class="form-control" id="editTaskName">
      </div>
      <div class="form-group">
        <label class="form-label">우선순위</label>
        <select class="form-control" id="editTaskPriority">
          <option value="urgent">긴급</option>
          <option value="high">높음</option>
          <option value="medium">중간</option>
          <option value="low">낮음</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-control" id="editTaskNote"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="closeEditModal()">취소</button>
        <button class="btn-primary" onclick="saveEditedTask()">저장</button>
      </div>
    </div>
  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-title">새 작업 추가</div>
      <div class="form-group">
        <label class="form-label">작업명</label>
        <input type="text" class="form-control" id="newTaskName" placeholder="작업 이름 입력">
      </div>
      <div class="form-group">
        <label class="form-label">우선순위</label>
        <select class="form-control" id="newTaskPriority">
          <option value="medium">중간</option>
          <option value="high">높음</option>
          <option value="urgent">긴급</option>
          <option value="low">낮음</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">카테고리 (색상)</label>
        <select class="form-control" id="newTaskCategory">
          <option value="c-action">액션</option>
          <option value="c-proj">프로젝트</option>
          <option value="c-course">학습</option>
          <option value="c-misc">기타</option>
          <option value="c-life">라이프스타일</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-control" id="newTaskNote" placeholder="선택사항"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="closeAddModal()">취소</button>
        <button class="btn-primary" onclick="addNewTask()">추가</button>
      </div>
    </div>
  </div>

  <script>
    // Global state
    let allTasks = [];
    let actionItems = [];
    let allCategories = [];
    let currentWeekStart = null;
    let weeklyPlan = {};
    let editingTaskId = null;
    let editingSlot = null;
    let draggedTask = null;
    let dragSourceSlot = null;
    let routineConfig = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadTasks();
      setCurrentWeek();
      initializeDatePicker();
    });

    function loadTasks() {
      fetch('tasks.json')
        .then(r => r.json())
        .then(data => {
          // Check localStorage override (same as Gantt chart)
          let finalData = data;
          const saved = localStorage.getItem('gantt-data');
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              if (parsed.categories && parsed.categories.length > 0) finalData = parsed;
            } catch (e) {}
          }

          allTasks = [];
          actionItems = [];
          allCategories = finalData.categories || [];
          finalData.categories.forEach((cat, catIdx) => {
            const tasks = cat.tasks.filter(t => t.id);
            allTasks = allTasks.concat(tasks);
            // First category is Action Items
            if (catIdx === 0 && cat.name.includes('Action')) {
              actionItems = tasks.filter(t => t.status !== 'done');
            }
          });
          routineConfig = finalData.routine || {};
          applyRoutineToHeader();
          renderActionItems();
          renderWeek();
        })
        .catch(err => console.error('Error loading tasks:', err));
    }

    function applyRoutineToHeader() {
      if (!routineConfig) return;
      const exerciseEl = document.getElementById('exerciseGoal');
      if (exerciseEl && routineConfig.exercise) {
        exerciseEl.textContent = routineConfig.exercise;
      }
    }

    function setCurrentWeek() {
      const today = new Date(2026, 2, 23); // Mar 23, 2026
      currentWeekStart = getWeekStart(today);
    }

    function getWeekStart(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff));
    }

    function initializeDatePicker() {
      const picker = document.getElementById('weekPicker');
      picker.value = currentWeekStart.toISOString().split('T')[0];
      picker.addEventListener('change', (e) => {
        currentWeekStart = getWeekStart(new Date(e.target.value));
        renderWeek();
      });
    }

    function renderActionItems() {
      const list = document.getElementById('actionItemsList');
      list.innerHTML = '';
      const priorityLabels = {urgent: 'URGENT', high: 'HIGH', medium: 'MED', low: 'LOW'};
      const priorityClasses = {urgent: 'priority-urgent', high: 'priority-high', medium: 'priority-medium', low: 'priority-low'};

      actionItems.forEach(task => {
        const chip = document.createElement('div');
        chip.className = 'action-item-chip';
        chip.draggable = true;
        chip.dataset.taskId = task.id;
        chip.innerHTML = `<span class="chip-priority ${priorityClasses[task.priority]}">${priorityLabels[task.priority]}</span> ${task.name}`;

        chip.addEventListener('dragstart', (e) => {
          draggedTask = { taskId: task.id, fromActionPanel: true };
          dragSourceSlot = null;
          chip.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'copy';
        });
        chip.addEventListener('dragend', () => {
          chip.classList.remove('dragging');
        });

        list.appendChild(chip);
      });

      // Make Action Items panel a drop target to remove tasks from blocks
      list.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (draggedTask && !draggedTask.fromActionPanel) {
          e.dataTransfer.dropEffect = 'move';
          list.style.outline = '2px dashed var(--accent)';
          list.style.background = 'var(--surface-hover)';
        }
      });
      list.addEventListener('dragleave', () => {
        list.style.outline = '';
        list.style.background = '';
      });
      list.addEventListener('drop', (e) => {
        e.preventDefault();
        list.style.outline = '';
        list.style.background = '';
        if (draggedTask && !draggedTask.fromActionPanel && dragSourceSlot) {
          // Remove task from the time block
          const tasks = weeklyPlan[dragSourceSlot.dayKey]?.tasks[dragSourceSlot.period];
          if (tasks && draggedTask.idx < tasks.length) {
            tasks.splice(draggedTask.idx, 1);
            saveWeeklyPlan();
            renderWeek();
          }
        }
        draggedTask = null;
        dragSourceSlot = null;
      });
    }

    function renderWeek() {
      loadWeeklyPlan();
      generateWeekLayout();
      updateFocusAndTraining();
    }

    function generateWeekLayout() {
      const grid = document.getElementById('daysGrid');
      grid.innerHTML = '';
      const dayNames = wt('days');

      for (let i = 0; i < 7; i++) {
        const date = new Date(currentWeekStart);
        date.setDate(date.getDate() + i);
        const dayCol = document.createElement('div');
        dayCol.className = 'day-column';
        if (i === 5) dayCol.className += ' saturday';
        if (i === 6) dayCol.className += ' sunday';
        if (i === 6) dayCol.classList.add('study-day');

        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerHTML = `<span class="day-name">${dayNames[i]}</span><span class="day-date">${(date.getMonth()+1)}/${date.getDate()}</span>`;

        dayCol.appendChild(header);

        // Get routine config
        const routine = routineConfig || {};
        const blocks = routine.blocks || [
          { key: 'morning', emoji: '🌅', label: wt('morning'), hours: '09-12', desc: '' },
          { key: 'afternoon', emoji: '☀️', label: wt('afternoon'), hours: '13-17', desc: '' },
          { key: 'evening', emoji: '🌙', label: wt('evening'), hours: '18-19', desc: '' }
        ];

        // Saturday - rest
        if (i === 5) {
          const restBlock = document.createElement('div');
          restBlock.className = 'rest-day time-block';
          restBlock.innerHTML = `<div style="font-size: 24px;">😴</div><div>${routine.saturday || wt('rest')}</div>`;
          dayCol.appendChild(restBlock);
        } else if (i === 6) {
          // Sunday - study and planning
          const studyBlock = document.createElement('div');
          studyBlock.className = 'time-block';
          studyBlock.style.background = 'linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%)';
          const studyLabel = document.createElement('div');
          studyLabel.className = 'time-label';
          studyLabel.textContent = `📚 ${routine.sunday || wt('study')}`;
          const container = document.createElement('div');
          container.className = 'tasks-container';
          const dayKey = formatDateKey(date);
          const tasksInSlot = getTasksForSlot(dayKey, 'full-day');
          renderTasksInSlot(container, tasksInSlot, dayKey, 'full-day');
          setupDropZone(studyBlock, dayKey, 'full-day');
          setupDropZone(container, dayKey, 'full-day');
          studyBlock.appendChild(studyLabel);
          studyBlock.appendChild(container);
          dayCol.appendChild(studyBlock);
        } else {
          // Weekdays - dynamic time blocks from routine config
          blocks.forEach(b => {
            const block = document.createElement('div');
            block.className = `time-block ${b.key}`;
            block.onclick = (e) => {
              if (e.target === block || e.target.classList.contains('time-label')) {
                openAddModal(formatDateKey(date), b.key);
              }
            };

            const label = document.createElement('div');
            label.className = 'time-label';
            label.textContent = `${b.emoji} ${b.label} (${b.hours})`;

            const container = document.createElement('div');
            container.className = 'tasks-container';
            const dayKey = formatDateKey(date);
            const tasksInSlot = getTasksForSlot(dayKey, b.key);
            renderTasksInSlot(container, tasksInSlot, dayKey, b.key);
            setupDropZone(block, dayKey, b.key);
            setupDropZone(container, dayKey, b.key);

            block.appendChild(label);
            block.appendChild(container);
            dayCol.appendChild(block);
          });
        }

        // Add day note section
        const noteDiv = document.createElement('div');
        noteDiv.className = 'day-note';
        const dayKey = formatDateKey(date);
        const savedNote = weeklyPlan[dayKey]?.note || '';
        noteDiv.textContent = savedNote;
        if (savedNote) noteDiv.classList.add('has-content');
        noteDiv.onclick = () => editDayNote(dayKey, noteDiv);
        dayCol.appendChild(noteDiv);

        grid.appendChild(dayCol);
      }
    }

    function formatDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function getWeekKey() {
      const d = new Date(currentWeekStart);
      const week = Math.ceil((d.getDate() + new Date(d.getFullYear(), d.getMonth(), 1).getDay()) / 7);
      return `weeklyPlan-${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
    }

    function loadWeeklyPlan() {
      const key = getWeekKey();
      const stored = localStorage.getItem(key);
      weeklyPlan = stored ? JSON.parse(stored) : {};
    }

    function saveWeeklyPlan() {
      const key = getWeekKey();
      localStorage.setItem(key, JSON.stringify(weeklyPlan));
    }

    function getTasksForSlot(dayKey, period) {
      if (!weeklyPlan[dayKey]) weeklyPlan[dayKey] = { tasks: {} };
      if (!weeklyPlan[dayKey].tasks[period]) weeklyPlan[dayKey].tasks[period] = [];
      return weeklyPlan[dayKey].tasks[period];
    }

    function setupDropZone(element, dayKey, period) {
      element.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = draggedTask?.fromActionPanel ? 'copy' : 'move';
        element.style.outline = '2px dashed var(--accent)';
      });
      element.addEventListener('dragleave', () => {
        element.style.outline = '';
      });
      element.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        element.style.outline = '';
        if (!draggedTask) return;

        if (draggedTask.fromActionPanel) {
          // Drop from Action Items panel — add to slot
          if (!weeklyPlan[dayKey]) weeklyPlan[dayKey] = { tasks: {} };
          if (!weeklyPlan[dayKey].tasks[period]) weeklyPlan[dayKey].tasks[period] = [];
          // Avoid duplicates
          const existing = weeklyPlan[dayKey].tasks[period].find(t =>
            (typeof t === 'string' ? t : t.id) === draggedTask.taskId
          );
          if (!existing) {
            weeklyPlan[dayKey].tasks[period].push(draggedTask.taskId);
          }
          saveWeeklyPlan();
          renderWeek();
        } else if (dragSourceSlot) {
          moveTask(dragSourceSlot.dayKey, dragSourceSlot.period, dayKey, period, draggedTask.idx);
        }
        draggedTask = null;
        dragSourceSlot = null;
      });
    }

    function renderTasksInSlot(container, taskIds, dayKey, period) {
      container.innerHTML = '';
      if (!taskIds || taskIds.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = wt('emptySlot');
        container.appendChild(empty);
        return;
      }

      taskIds.forEach((taskIdOrObj, idx) => {
        const taskId = typeof taskIdOrObj === 'string' ? taskIdOrObj : taskIdOrObj.id;
        const taskNote = typeof taskIdOrObj === 'object' ? taskIdOrObj.note : '';
        const task = allTasks.find(t => t.id === taskId);
        if (!task) return;

        const card = document.createElement('div');
        card.className = `task-card ${task.cls}`;
        card.draggable = true;
        card.dataset.taskId = taskId;
        card.dataset.dayKey = dayKey;
        card.dataset.period = period;
        card.dataset.index = idx;

        const priorityClass = `priority-${task.priority}`;
        const priorityLabel = {urgent: wt('urgent'), high: wt('high'), medium: wt('medium'), low: wt('low')}[task.priority];

        card.innerHTML = `
          <button class="task-remove-btn" title="Remove">✕</button>
          <div style="display: flex; align-items: center; gap: 4px;">
            <span class="task-priority ${priorityClass}">${priorityLabel}</span>
          </div>
          <div class="task-name">${task.name}</div>
          ${taskNote ? `<div style="font-size: 9px; color: #666; margin-top: 3px; font-style: italic;">📝 ${taskNote}</div>` : ''}
        `;

        card.querySelector('.task-remove-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          const tasks = getTasksForSlot(dayKey, period);
          tasks.splice(idx, 1);
          saveWeeklyPlan();
          renderWeek();
        });

        card.addEventListener('click', (e) => {
          if (!e.target.closest('.task-remove-btn') && !e.target.closest('.task-btn')) {
            openEditModal(taskId, dayKey, period, idx, taskNote);
          }
        });

        card.addEventListener('dragstart', (e) => {
          draggedTask = { taskId, dayKey, period, idx };
          dragSourceSlot = { dayKey, period };
          card.classList.add('dragging');
        });

        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
        });

        card.addEventListener('dragover', (e) => {
          e.preventDefault();
        });

        card.addEventListener('drop', (e) => {
          e.preventDefault();
          if (draggedTask && dragSourceSlot) {
            moveTask(dragSourceSlot.dayKey, dragSourceSlot.period, dayKey, period, draggedTask.idx);
          }
        });

        container.appendChild(card);
      });
    }

    function moveTask(fromDay, fromPeriod, toDay, toPeriod, index) {
      if (!weeklyPlan[fromDay]?.tasks[fromPeriod]) return;
      const tasks = weeklyPlan[fromDay].tasks[fromPeriod];
      if (index >= tasks.length) return;

      const task = tasks[index];
      tasks.splice(index, 1);

      if (!weeklyPlan[toDay]) weeklyPlan[toDay] = { tasks: {} };
      if (!weeklyPlan[toDay].tasks[toPeriod]) weeklyPlan[toDay].tasks[toPeriod] = [];
      weeklyPlan[toDay].tasks[toPeriod].push(task);

      saveWeeklyPlan();
      renderWeek();
    }

    function updateFocusAndTraining() {
      // Find urgent/high priority projects
      const urgentTasks = allTasks.filter(t => {
        const isInWeek = t.start <= formatDateKey(new Date(currentWeekStart.getTime() + 6*24*60*60*1000)) &&
                        t.end >= formatDateKey(currentWeekStart);
        return isInWeek && ['urgent', 'high'].includes(t.priority) &&
               (t.cls === 'c-proj' || t.cls === 'c-action');
      });

      const focusProject = urgentTasks.length > 0 ? urgentTasks[0].name : wt('noFocus');
      document.getElementById('focusProject').textContent = focusProject;

      // Find current training (urgent course)
      const courses = allTasks.filter(t => {
        const isInWeek = t.start <= formatDateKey(new Date(currentWeekStart.getTime() + 6*24*60*60*1000)) &&
                        t.end >= formatDateKey(currentWeekStart);
        return isInWeek && t.priority === 'urgent' && (t.cls === 'c-course' || t.cls === 'c-zoomcamp');
      });

      const training = courses.length > 0 ? courses[0].name : 'Leetcode SQL';
      document.getElementById('currentTraining').textContent = training;
    }

    function openEditModal(taskId, dayKey, period, index, note) {
      editingTaskId = { taskId, dayKey, period, index };
      editingSlot = { dayKey, period };
      const task = allTasks.find(t => t.id === taskId);
      if (!task) return;

      document.getElementById('editTaskName').value = task.name;
      document.getElementById('editTaskPriority').value = task.priority;
      document.getElementById('editTaskNote').value = note || '';
      document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      editingTaskId = null;
      editingSlot = null;
    }

    function saveEditedTask() {
      if (!editingTaskId) return;
      const { dayKey, period, index } = editingTaskId;
      const note = document.getElementById('editTaskNote').value;

      const tasks = getTasksForSlot(dayKey, period);
      if (index < tasks.length) {
        if (typeof tasks[index] === 'string') {
          tasks[index] = { id: tasks[index], note };
        } else {
          tasks[index].note = note;
        }
      }

      saveWeeklyPlan();
      closeEditModal();
      renderWeek();
    }

    function deleteTask(dayKey, period, index) {
      if (confirm(wt('confirmDelete'))) {
        const tasks = getTasksForSlot(dayKey, period);
        tasks.splice(index, 1);
        saveWeeklyPlan();
        renderWeek();
      }
    }

    function openAddModal(dayKey, period) {
      document.getElementById('newTaskName').value = '';
      document.getElementById('newTaskPriority').value = 'medium';
      document.getElementById('newTaskNote').value = '';
      editingSlot = { dayKey, period };
      document.getElementById('addModal').classList.add('active');
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
      editingSlot = null;
    }

    function addNewTask() {
      if (!editingSlot) return;
      const name = document.getElementById('newTaskName').value.trim();
      const priority = document.getElementById('newTaskPriority').value;
      const category = document.getElementById('newTaskCategory').value;
      const note = document.getElementById('newTaskNote').value;

      if (!name) {
        alert(wt('enterTaskName'));
        return;
      }

      const newTask = {
        id: `manual-${Date.now()}`,
        name,
        priority,
        cls: category,
        status: 'progress',
        start: editingSlot.dayKey,
        end: editingSlot.dayKey
      };

      allTasks.push(newTask);
      if (!weeklyPlan[editingSlot.dayKey]) weeklyPlan[editingSlot.dayKey] = { tasks: {} };
      if (!weeklyPlan[editingSlot.dayKey].tasks[editingSlot.period]) weeklyPlan[editingSlot.dayKey].tasks[editingSlot.period] = [];
      weeklyPlan[editingSlot.dayKey].tasks[editingSlot.period].push({ id: newTask.id, note });
      saveWeeklyPlan();
      closeAddModal();
      renderWeek();
    }

    function editDayNote(dayKey, element) {
      const currentNote = element.textContent.replace(wt('addNote'), '');
      const newNote = prompt(wt('notePrompt'), currentNote.trim());
      if (newNote !== null) {
        if (!weeklyPlan[dayKey]) weeklyPlan[dayKey] = { tasks: {} };
        weeklyPlan[dayKey].note = newNote;
        saveWeeklyPlan();
        element.textContent = newNote;
        if (newNote) element.classList.add('has-content');
        else element.classList.remove('has-content');
      }
    }

    function goToCurrentWeek() {
      currentWeekStart = getWeekStart(new Date(2026, 2, 23));
      document.getElementById('weekPicker').value = currentWeekStart.toISOString().split('T')[0];
      renderWeek();
    }

    function goToPreviousWeek() {
      currentWeekStart = new Date(currentWeekStart.getTime() - 7*24*60*60*1000);
      document.getElementById('weekPicker').value = currentWeekStart.toISOString().split('T')[0];
      renderWeek();
    }

    function goToNextWeek() {
      currentWeekStart = new Date(currentWeekStart.getTime() + 7*24*60*60*1000);
      document.getElementById('weekPicker').value = currentWeekStart.toISOString().split('T')[0];
      renderWeek();
    }

    function saveToServer() {
      const saved = localStorage.getItem('gantt-data');
      if (!saved) {
        alert(currentLang === 'ko' ? '저장할 데이터가 없습니다.' : 'No data to save.');
        return;
      }
      const btn = document.getElementById('weeklySaveBtn');
      btn.disabled = true;
      btn.textContent = '⏳';
      fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: saved
      })
      .then(r => r.json())
      .then(data => {
        btn.textContent = '✅ Saved';
        setTimeout(() => { btn.textContent = '💾 Save'; btn.disabled = false; }, 1500);
      })
      .catch(err => {
        btn.textContent = '❌ Error';
        setTimeout(() => { btn.textContent = '💾 Save'; btn.disabled = false; }, 2000);
      });
    }

    function exportMarkdown() {
      const isEn = currentLang === 'en';
      let markdown = `# ${isEn ? 'Weekly Planner' : '주간 플래너'} ${formatDateKey(currentWeekStart)} ~ ${formatDateKey(new Date(currentWeekStart.getTime() + 6*24*60*60*1000))}\n\n`;
      markdown += `## 🎯 ${isEn ? 'This Week' : '이번주 핵심'}\n`;
      markdown += `- **${isEn ? 'Focus Project' : '핵심 프로젝트'}**: ${document.getElementById('focusProject').textContent}\n`;
      markdown += `- **${isEn ? 'Current Training' : '현재 학습'}**: ${document.getElementById('currentTraining').textContent}\n`;
      markdown += `- **${isEn ? 'Goal' : '목표'}**: ${routineConfig?.exercise || wt('defaultGoal')}\n\n`;

      const dayNames = wt('days');
      for (let i = 0; i < 7; i++) {
        const date = new Date(currentWeekStart);
        date.setDate(date.getDate() + i);
        const dayKey = formatDateKey(date);
        const dayName = dayNames[i];
        markdown += `### ${dayName} (${date.getMonth()+1}/${date.getDate()})\n`;

        if (i === 5) {
          markdown += `**${wt('rest')}** 😴\n\n`;
        } else if (i === 6) {
          markdown += `#### 📚 ${wt('study')}\n`;
          const tasks = getTasksForSlot(dayKey, 'full-day');
          if (tasks.length > 0) {
            tasks.forEach(t => {
              const id = typeof t === 'string' ? t : t.id;
              const task = allTasks.find(x => x.id === id);
              if (task) markdown += `- ${task.name} (${task.priority})\n`;
            });
          }
          markdown += '\n';
        } else {
          const rBlocks = routineConfig?.blocks || [
            { key: 'morning', emoji: '🌅', label: wt('morning'), hours: '09-12' },
            { key: 'afternoon', emoji: '☀️', label: wt('afternoon'), hours: '13-17' },
            { key: 'evening', emoji: '🌙', label: wt('evening'), hours: '18-19' }
          ];
          const periods = rBlocks.map(b => ({ key: b.key, label: `${b.emoji} ${b.label} (${b.hours})` }));
          periods.forEach(period => {
            const tasks = getTasksForSlot(dayKey, period.key);
            if (tasks.length > 0) {
              markdown += `#### ${period.label}\n`;
              tasks.forEach(t => {
                const id = typeof t === 'string' ? t : t.id;
                const task = allTasks.find(x => x.id === id);
                if (task) markdown += `- ${task.name} (${task.priority})\n`;
              });
            }
          });
          const note = weeklyPlan[dayKey]?.note;
          if (note) markdown += `**📝 ${isEn ? 'Note' : '노트'}**: ${note}\n`;
          markdown += '\n';
        }
      }

      const blob = new Blob([markdown], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `weekly-planner-${formatDateKey(currentWeekStart)}.md`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Close modals on overlay click
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target.id === 'editModal') closeEditModal();
    });
    document.getElementById('addModal').addEventListener('click', (e) => {
      if (e.target.id === 'addModal') closeAddModal();
    });

    // Theme toggle (synced with gantt chart via localStorage)
    function applyTheme(dark) {
      document.body.classList.toggle('dark', dark);
      document.getElementById('themeLight').classList.toggle('active', !dark);
      document.getElementById('themeDark').classList.toggle('active', dark);
      localStorage.setItem('gantt-theme', dark ? 'dark' : 'light');
    }
    document.getElementById('themeToggle').addEventListener('click', () => {
      applyTheme(!document.body.classList.contains('dark'));
    });
    if (localStorage.getItem('gantt-theme') === 'dark') applyTheme(true);

    // Language toggle (synced with gantt chart via localStorage)
    let currentLang = localStorage.getItem('gantt-lang') || 'ko';
    const wI18n = {
      ko: {
        title: '주간 플래너 📅', pageTitle: '주간 플래너',

        rest: '완전 휴식', study: '깊은 학습 & 다음주 계획',
        morning: '아침', afternoon: '오후', evening: '저녁',
        days: ['월', '화', '수', '목', '금', '토', '일'],
        actionItems: '🔴 Action Items', actionHint: '아래 시간 블록으로 드래그하세요',
      },
      en: {
        title: 'Weekly Planner 📅', pageTitle: 'Weekly Planner',
        backLink: '← Back to Gantt Chart',
        focusLabel: '🎯 Focus Project', trainingLabel: '📚 Current Training', goalLabel: '🏃 Goal',
        loading: 'Loading...', defaultGoal: 'Exercise 2-3x this week',
        weekLabel: 'Select Week:', thisWeek: 'This Week', prevWeek: '← Prev', nextWeek: 'Next →',
        exportMd: '📥 Export Markdown',
        editTitle: 'Edit Task', addTitle: 'Add New Task',
        taskName: 'Task Name', priority: 'Priority', memo: 'Memo', category: 'Category (Color)',

        cancel: 'Cancel', save: 'Save', add: 'Add',
        taskPlaceholder: 'Enter task name', memoPlaceholder: 'Optional',
        action: 'Action', project: 'Project', course: 'Study', misc: 'Misc', lifestyle: 'Lifestyle',
        emptySlot: 'Click to add task', addNote: '+ Add note',

        actionItems: '🔴 Action Items', actionHint: 'Drag tasks into time blocks below',
      }
    };
    function wt(key) { return wI18n[currentLang][key] || key; }

    function applyLang() {
      document.getElementById('langEN').classList.toggle('active', currentLang === 'en');
      document.getElementById('langKO').classList.toggle('active', currentLang === 'ko');
      // Header
      document.title = wt('pageTitle');
      document.querySelector('.header-title').textContent = wt('title');
      document.querySelector('.nav-link').textContent = wt('backLink');
      // Info labels
      document.querySelectorAll('.info-label')[0].textContent = wt('focusLabel');
      document.querySelectorAll('.info-label')[1].textContent = wt('trainingLabel');
      document.querySelectorAll('.info-label')[2].textContent = wt('goalLabel');
      // Controls
      document.querySelector('label[for="weekPicker"]').textContent = wt('weekLabel');
      const btns = document.querySelectorAll('.controls button');
      btns[0].textContent = wt('thisWeek');
      btns[1].textContent = wt('prevWeek');
      btns[2].textContent = wt('nextWeek');
      document.querySelector('.export-btn').textContent = wt('exportMd');
      document.getElementById('weeklySaveBtn').textContent = '💾 ' + (currentLang === 'en' ? 'Save' : '저장');
      // Edit modal
      document.getElementById('modalTitle').textContent = wt('editTitle');
      const editLabels = document.querySelectorAll('#editModal .form-label');
      if (editLabels[0]) editLabels[0].textContent = wt('taskName');
      if (editLabels[1]) editLabels[1].textContent = wt('priority');
      if (editLabels[2]) editLabels[2].textContent = wt('memo');
      const editPri = document.getElementById('editTaskPriority');
      editPri.options[0].textContent = wt('urgent');
      editPri.options[1].textContent = wt('high');
      editPri.options[2].textContent = wt('medium');
      editPri.options[3].textContent = wt('low');
      document.querySelector('#editModal .btn-secondary').textContent = wt('cancel');
      document.querySelector('#editModal .btn-primary').textContent = wt('save');
      // Add modal
      document.querySelector('#addModal .modal-title').textContent = wt('addTitle');
      const addLabels = document.querySelectorAll('#addModal .form-label');
      if (addLabels[0]) addLabels[0].textContent = wt('taskName');
      if (addLabels[1]) addLabels[1].textContent = wt('priority');
      if (addLabels[2]) addLabels[2].textContent = wt('category');
      if (addLabels[3]) addLabels[3].textContent = wt('memo');
      document.getElementById('newTaskName').placeholder = wt('taskPlaceholder');
      document.getElementById('newTaskNote').placeholder = wt('memoPlaceholder');
      const addPri = document.getElementById('newTaskPriority');
      addPri.options[0].textContent = wt('medium');
      addPri.options[1].textContent = wt('high');
      addPri.options[2].textContent = wt('urgent');
      addPri.options[3].textContent = wt('low');
      const addCat = document.getElementById('newTaskCategory');
      addCat.options[0].textContent = wt('action');
      addCat.options[1].textContent = wt('project');
      addCat.options[2].textContent = wt('course');
      addCat.options[3].textContent = wt('misc');
      addCat.options[4].textContent = wt('lifestyle');
      document.querySelector('#addModal .btn-secondary').textContent = wt('cancel');
      document.querySelector('#addModal .btn-primary').textContent = wt('add');
      // Action items
      document.querySelector('.action-items-title').textContent = wt('actionItems');
      document.querySelector('.action-items-hint').textContent = wt('actionHint');
      // Re-render week to update day names and labels
      renderWeek();
    }
    document.getElementById('langToggle').addEventListener('click', () => {
      currentLang = currentLang === 'ko' ? 'en' : 'ko';
      localStorage.setItem('gantt-lang', currentLang);
      applyLang();
    });
    applyLang();
  </script>
